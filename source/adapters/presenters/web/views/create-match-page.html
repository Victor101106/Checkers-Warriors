<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="UTF-8">

    <!-- Link Tags -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="shortcut icon" href="/static/assets/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="/static/styles/components/card-list.css">
    <link rel="stylesheet" href="/static/styles/components/buttons.css">
    <link rel="stylesheet" href="/static/styles/create-match-page.css">
    <link rel="stylesheet" href="/static/styles/components/footer.css">
    <link rel="stylesheet" href="/static/styles/components/header.css">
    <link rel="stylesheet" href="/static/styles/components/board.css">
    <link rel="stylesheet" href="/static/styles/template-page.css">

    <!-- Title Tag -->
    <title>Create Match • Checkers Warriors</title>

</head>
<body>

    <!-- Header -->
    <header id="header-container">
        <div id="header-left-wrapper">
            <a id="header-link" href="/"><img id="header-logotype" src="/static/assets/logotype.png" alt="Checkers Warrior Logo"></a>
            <i id="header-menu-toggle" class="ri-menu-line"></i>
        </div>
        <nav id="header-nav-wrapper">
            <a class="header-nav-link" href="/"><button class="button ghost-button">Home</button></a>
            <a class="header-nav-link" href="/about"><button class="button ghost-button">About</button></a>
            <a class="header-nav-link" href="/contact"><button class="button ghost-button">Contact</button></a>
        </nav>
    </header>

    <!-- Main -->
    <main id="main-container">
        <div id="main-card-list" class="card-list">
            <div class="card-list-item card-list-item-green">
                <div class="card-list-item-wrapper">
                    <div class="card-list-item-image-wrapper">
                        <img class="card-list-item-image" src="/static/assets/board-face.png">
                    </div>
                    <p class="card-list-item-title">Brazilian Checkers</p>
                    <p class="card-list-item-description">Brazilian Checkers abides by International draughts' rules, with distinctions in a smaller 8×8 board and 12 checkers per player instead of 20.</p>
                </div>
                <button id="card-list-item-button-brazilian" class="button button-small outlined-button card-list-item-button">
                    <span>Create</span>
                    <i class="ri-arrow-right-line"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer id="footer-container">
        <a class="footer-link" href="https://github.com/Victor101106/Checkers-Warriors" target="_blank"><i class="footer-icon ri-github-fill"></i></a>
        <a class="footer-link" href="https://www.linkedin.com/in/victor101106/" target="_blank"><i class="footer-icon ri-linkedin-fill"></i></a>
    </footer>

    <!-- Scripts -->
    <script type="module" src="/static/scripts/create-match-page.js"></script>

</body>
</html>
